services:
  mongodb:
    image: mongo:7
    container_name: mongo-rs
    ports:
      - "27017:27017"
    command: ["--replSet", "rs0"]
    volumes:
      - mongo-data:/data/db
      - ./scripts/rs-init.js:/docker-entrypoint-initdb.d/rs-init.js:ro
    healthcheck:
      test: |
        mongosh --eval "
          try {
            rs.status().ok === 1 ? process.exit(0) : process.exit(1)
          } catch(e) {
            process.exit(1)
          }
        "
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  seeder:
    image: mongo:7
    container_name: mongo-seeder
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./scripts/seed.js:/scripts/seed.js:ro
    entrypoint: ["mongosh", "mongodb://mongodb:27017", "/scripts/seed.js"]
    restart: "no"

volumes:
  mongo-data:
