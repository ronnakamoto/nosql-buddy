# ─── Audit services stack (Dev Mode) ────────────────────────────────────
# Brings up the full nosqlbuddy audit system locally:
#   - publisher: change stream → Merkle tree → IPFS (Pinata) → Stellar
#   - attester:  independent replica → oplog hash → on-chain attestation
#   - reader:    on-chain root query → local verification
#
# This is SEPARATE from docker-compose.yml (the single-node dev database). The
# audit stack needs the 3-node replica set. Run it first:
#   docker compose -f docker-compose.audit-db.yml up -d   # mongo1/2/3 + seeder
#   docker compose -f docker-compose.audit.yml up -d      # the audit stack
#
# The audit containers connect to the replica set over the shared `mongo-net`
# Docker network, by container name: the publisher uses
# mongo1/mongo2/mongo3:27017 and the attester/reader use mongo3:27017. The
# `host.docker.internal` mapping below is only for reaching host services such
# as a local IPFS daemon, not MongoDB.
#
# The daemon signs Stellar transactions natively (ed25519 + Soroban RPC).
# No `stellar` CLI or identity mount is needed — pass the secret keys via
# environment variables (STELLAR_SECRET_KEY, ATTESTER_SECRET_KEY) in .env.audit.
#
# Credentials are read from .env.audit (gitignored). The `setup` wizard writes
# this file for you (see README → Dev Mode). The `env_file` entries below are
# marked optional (required: false) so the one-off `setup` service can run and
# create .env.audit before it exists; `up` then loads it normally.

name: nosqlbuddy-audit

services:
  # ─── Publisher ────────────────────────────────────────────────────────
  # Watches the primary's change stream, builds the Merkle tree, manages
  # epochs, publishes batches to Pinata, and commits roots to Stellar.
  publisher:
    build:
      context: .
      dockerfile: audit-service/Dockerfile.audit
    # Source dev builds use the locally-built `nosqlbuddy-audit:dev`. Packaged
    # builds set AUDIT_IMAGE to the published image so `up` pulls (no --build).
    image: ${AUDIT_IMAGE:-nosqlbuddy-audit:dev}
    ports:
      - "9173:9173"
    command:
      - "start"
      - "--mode"
      - "publish"
      - "--mongo-uri"
      - "${PUBLISHER_MONGO_URI:-mongodb://root:nosqlbuddy-dev-root-pw@mongo1:27017,mongo2:27017,mongo3:27017/?replicaSet=rs0&authSource=admin}"
      - "--port"
      - "9173"
      - "--data-dir"
      - "/data/publisher"
      - "--rpc-url"
      - "https://soroban-testnet.stellar.org:443"
      - "--network"
      - "testnet"
      - "--epoch-threshold"
      - "100"
      - "--circuit-dir"
      - "/opt/circuits"
      - "--proving-key"
      - "/opt/circuits/merkle_inclusion.pkey"
      - "--ipfs-api"
      - "http://host.docker.internal:5001"
    volumes:
      - audit-publisher-data:/data/publisher
    env_file:
      - path: .env.audit
        required: false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - mongo-net
    restart: unless-stopped

  # ─── Independent Attester ─────────────────────────────────────────────
  # Connects to the INDEPENDENT replica member (mongo3, port 27019),
  # independently computes the oplog hash, and submits attestations to the
  # contract. This is the trust anchor for oplog completeness verification.
  attester:
    image: ${AUDIT_IMAGE:-nosqlbuddy-audit:dev}
    build:
      context: .
      dockerfile: audit-service/Dockerfile.audit
    ports:
      - "9174:9174"
    command:
      - "start"
      - "--mode"
      - "attest"
      - "--mongo-uri"
      - "${ATTESTER_MONGO_URI:-mongodb://auditor:nosqlbuddy-dev-auditor-pw@mongo3:27017/?authSource=admin}"
      - "--port"
      - "9174"
      - "--data-dir"
      - "/data/attester"
      - "--rpc-url"
      - "https://soroban-testnet.stellar.org:443"
      - "--network"
      - "testnet"
    volumes:
      - audit-attester-data:/data/attester
      - ./attester.key:/data/attester/audit/attester.key:ro
    env_file:
      - path: .env.audit
        required: false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - mongo-net
    restart: unless-stopped

  # ─── Reader ───────────────────────────────────────────────────────────
  # Reads on-chain commitments from Stellar, fetches batches from IPFS,
  # rebuilds the Merkle tree in local sled, and verifies roots match.
  reader:
    image: ${AUDIT_IMAGE:-nosqlbuddy-audit:dev}
    build:
      context: .
      dockerfile: audit-service/Dockerfile.audit
    ports:
      - "9175:9175"
    command:
      - "start"
      - "--mode"
      - "read"
      - "--mongo-uri"
      - "${READER_MONGO_URI:-mongodb://auditor:nosqlbuddy-dev-auditor-pw@mongo3:27017/?authSource=admin}"
      - "--port"
      - "9175"
      - "--data-dir"
      - "/data/reader"
      - "--rpc-url"
      - "https://soroban-testnet.stellar.org:443"
      - "--ipfs-api"
      - "http://host.docker.internal:5001"
    volumes:
      - audit-reader-data:/data/reader
    env_file:
      - path: .env.audit
        required: false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - mongo-net
    restart: unless-stopped

  # ─── One-off setup wizard (Dev Mode) ──────────────────────────────────
  # Interactive wizard that does all the audit key setup for you: generates
  # the publisher + attester Stellar keypairs, funds them on testnet via
  # Friendbot, deploys a fresh audit contract (publisher becomes admin),
  # generates the attester
  # ed25519 oplog key, authorizes the attester on the contract, and writes
  # ./attester.key + .env.audit into the project root (mounted at /work) —
  # exactly where the publisher/attester/reader services pick them up.
  #
  # Gated behind the "setup" profile so it never starts with `up`. Run it in
  # an interactive terminal with:
  #   docker compose -f docker-compose.audit.yml run --build --rm setup
  #
  # `docker compose run SERVICE ARGS...` replaces `command:` entirely rather
  # than appending to it (e.g. the desktop app's non-interactive setup flow,
  # or a manual `run --rm setup --role publisher`, both drop the `command:`
  # below). So the verifying key path is passed via `environment:` instead,
  # which survives command overrides. The verifying key is pinned on-chain
  # forever at `initialize`, so it must be the real ceremony output baked
  # into the image at /opt/circuits, not omitted or swapped for a
  # placeholder — hence it's always set here, not left to be forgotten.
  setup:
    image: ${AUDIT_IMAGE:-nosqlbuddy-audit:dev}
    build:
      context: .
      dockerfile: audit-service/Dockerfile.audit
    profiles: ["setup"]
    working_dir: /work
    volumes:
      - .:/work
    environment:
      VKEY_PATH: /opt/circuits/merkle_inclusion.vkey
      # Registers the audited_action (disclosure) circuit's VK right after
      # initialize, so `verify_disclosure` works on dev contracts. Write-once,
      # same env-over-command reasoning as VKEY_PATH above.
      DISCLOSURE_VKEY_PATH: /opt/circuits/audited_action.vkey
    # The desktop "Set up" flow writes a temporary .setup.env (Stellar network,
    # optional operator secret keys, Pinata creds) into the stack dir before
    # running this service, then deletes it afterward. Loaded here so the keys
    # reach the wizard as container env vars without relying on the
    # `run --env-file` flag (unsupported on older Compose releases). Optional so
    # normal `up` works when the file is absent.
    env_file:
      - path: .setup.env
        required: false
    command: ["setup", "--vkey-path", "/opt/circuits/merkle_inclusion.vkey", "--disclosure-vkey-path", "/opt/circuits/audited_action.vkey"]

volumes:
  audit-publisher-data:
  audit-attester-data:
  audit-reader-data:

networks:
  mongo-net:
    external: true
    name: mongo-net
