name: release

# Builds signed installers for macOS (universal), Windows, and Linux and
# publishes them to a GitHub Release whenever a `v*` tag is pushed.
#
# Required secrets (see .github/RELEASE.md for how to obtain each one):
#   APPLE_CERTIFICATE                    base64 of the Developer ID Application .p12
#   APPLE_CERTIFICATE_PASSWORD           password for that .p12
#   APPLE_SIGNING_IDENTITY               e.g. "Developer ID Application: Name (TEAMID)"
#   APPLE_ID                             Apple ID email used for notarization
#   APPLE_PASSWORD                       app-specific password for that Apple ID
#   APPLE_TEAM_ID                        Apple Developer Team ID
#   TAURI_SIGNING_PRIVATE_KEY            updater private key (cargo tauri signer generate)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD   password for the updater private key
#
# Windows binaries are NOT code-signed yet (no certificate available). This
# means Windows SmartScreen will show an "unknown publisher" warning until a
# code-signing certificate is added.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  draft-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - uses: actions/checkout@v4
      - name: Create draft release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.replace('refs/tags/', ''),
              name: `NoSQLBuddy ${context.ref.replace('refs/tags/', '')}`,
              body: 'See the assets below to download and install.',
              draft: true,
              prerelease: false,
            });
            return data.id;

  build:
    needs: draft-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libdbus-1-dev \
            libsecret-1-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      # `src-tauri/resources/contract/zk_audit_commitment.wasm` is a build
      # artifact (gitignored, same as the Docker image build in
      # audit-service/Dockerfile.audit) that tauri.conf.json bundles as a
      # resource, so it must exist before `cargo tauri build` runs.
      - name: Build Soroban audit contract wasm
        shell: bash
        run: |
          rustup target add wasm32v1-none
          cargo build --release --target wasm32v1-none \
            --manifest-path zk-audit/soroban-contract/Cargo.toml
          mkdir -p src-tauri/resources/contract
          cp zk-audit/soroban-contract/target/wasm32v1-none/release/zk_audit_commitment.wasm \
            src-tauri/resources/contract/zk_audit_commitment.wasm

      - name: Import Apple signing certificate
        if: matrix.platform == 'macos-latest'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing + notarization (no-ops on Linux/Windows runners)
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # updater artifact signing
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.draft-release.outputs.release_id }}
          includeUpdaterJson: true
          args: ${{ matrix.args }}

  publish-release:
    needs: [draft-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.draft-release.outputs.release_id }},
              draft: false,
            });
